version: '3.8'

services:
  voxcue-backend:
    image: ghcr.io/khoaminh-dev/voxcue-backend:latest
    container_name: voxcue-backend
    restart: unless-stopped
    env_file:
      - voxcue-backend.env
    environment:
      - NODE_ENV=production
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Router settings
      - "traefik.http.routers.voxcue-api.rule=Host(`apivoxcue.bkuteam.site`)"
      - "traefik.http.routers.voxcue-api.entrypoints=websecure"
      - "traefik.http.routers.voxcue-api.tls.certresolver=letsencrypt" # Adjust to match your SANKIT Traefik config
      # Service settings
      - "traefik.http.services.voxcue-api.loadbalancer.server.port=5000"
      
networks:
  proxy:
    external: true
